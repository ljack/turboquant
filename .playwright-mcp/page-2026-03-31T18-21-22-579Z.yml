        - generic [ref=e65]: TurboBot
        - generic [ref=e66]:
          - strong [ref=e67]: QJL (Quantized JL)
          - text: is
          - strong [ref=e68]: Stage 2
          - text: of TurboQuant—a clever 1-bit error-correction trick that fixes a fundamental problem with uniform quantization after rotation.
          - text: "---"
          - text: "###"
          - strong [ref=e69]: The Problem QJL Solves
          - text: After PolarQuant’s orthogonal rotation, each coordinate follows a predictable Beta distribution. Uniform quantization (e.g., 3-bit) is applied to compress values.
          - text: But uniform quantizers are
          - strong [ref=e70]: biased
          - text: —they systematically underestimate the magnitude of inner products (dot products) between vectors. This bias hurts model accuracy.
          - text: "---"
          - text: "###"
          - strong [ref=e71]: How QJL Works (Cleverly)
          - text: "1."
          - strong [ref=e72]: Compute the residual
          - text: ": After uniform quantization, you have a quantization error (residual) per coordinate."
          - text: "2."
          - strong [ref=e73]: Random projection
          - text: ": Multiply the residual vector by a"
          - emphasis [ref=e74]: random Gaussian vector
          - text: (same for all tokens/layers, fixed at setup).
          - text: "3."
          - strong [ref=e75]: Store only the sign
          - text: ": Instead of storing the full residual, store just"
          - strong [ref=e76]: 1 bit
          - text: —whether the projected residual is positive or negative.
          - text: "4."
          - strong [ref=e77]: At decode time
          - text: ": Use this sign to"
          - emphasis [ref=e78]: correct the bias
          - text: in the inner product estimate.
          - text: "---"
          - text: "###"
          - strong [ref=e79]: Why It’s Clever
          - text: "-"
          - strong [ref=e80]: Unbiased estimation
          - text: ": The sign bit provides an unbiased estimator of the inner product contribution from the residual, canceling the uniform quantizer"
